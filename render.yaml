services:
  - type: web
    name: findmyitem-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true

  - type: static
    name: findmyitem-web
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: build
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: findmyitem-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
